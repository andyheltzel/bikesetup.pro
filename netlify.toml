# BikeSetup.Pro — Netlify Configuration

[build]
  publish = "."

# Clean URL handling
[[redirects]]
  from = "/calculators"
  to = "/calculators.html"
  status = 301

[[redirects]]
  from = "/guides"
  to = "/guides/index.html"
  status = 301

[[redirects]]
  from = "/guides/build-a-wheel"
  to = "/guides/build-a-wheel.html"
  status = 301

[[redirects]]
  from = "/guides/seat-tubeless-tire"
  to = "/guides/seat-tubeless-tire.html"
  status = 301

[[redirects]]
  from = "/guides/tubeless-conversion"
  to = "/guides/tubeless-conversion.html"
  status = 301

[[redirects]]
  from = "/guides/true-a-wheel"
  to = "/guides/true-a-wheel.html"
  status = 301

[[redirects]]
  from = "/guides/set-up-brakes"
  to = "/guides/set-up-brakes.html"
  status = 301

[[redirects]]
  from = "/guides/fit-basics"
  to = "/guides/fit-basics.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/suspension"
